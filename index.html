<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDIA NEXUS // NEURAL STREAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #030712;
        }
        body { 
            background: var(--bg-dark); 
            color: #f8fafc; 
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(188, 19, 254, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
            z-index: -1;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .neon-glow:focus {
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            border-color: var(--neon-blue);
        }
        .stream-container {
            position: relative; width: 100%; padding-top: 56.25%;
            background: #000; border-radius: 1rem; overflow: hidden;
        }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="min-h-screen">
    <div class="mesh-bg"></div>

    <div class="container mx-auto max-w-6xl px-4 py-12">
        <!-- Header -->
        <header class="flex flex-col items-center mb-16 text-center">
            <div class="inline-block px-3 py-1 mb-4 border border-cyan-500/30 rounded-full bg-cyan-500/10 text-cyan-400 text-xs font-bold tracking-[0.2em] uppercase">
                Core Engine v3.0 // Ready
            </div>
            <h1 class="text-6xl md:text-8xl font-bold tracking-tighter text-white drop-shadow-2xl">
                MEDIA<span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">NEXUS</span>
            </h1>
            <p class="mt-4 text-slate-400 max-w-xl font-light text-lg">Decentralized metadata resolution and global stream aggregation protocol.</p>
        </header>

        <!-- Command Center -->
        <section class="max-w-3xl mx-auto mb-12">
            <div class="glass-panel p-2 rounded-2xl flex flex-col md:flex-row gap-2">
                <input type="text" id="targetID" placeholder="INPUT TITLE (e.g. Kalki 2898 AD)" 
                    class="flex-1 bg-transparent border-none px-6 py-4 text-xl font-medium focus:outline-none placeholder:text-slate-600">
                <button onclick="initiateProtocol()" class="bg-gradient-to-r from-cyan-600 to-blue-700 hover:from-cyan-500 hover:to-blue-600 text-white font-black px-10 py-4 rounded-xl transition-all hover:scale-[1.02] active:scale-95 uppercase tracking-widest text-sm">
                    Resolve
                </button>
            </div>
            
            <div id="terminal" class="mt-4 px-4 font-mono text-[10px] uppercase tracking-widest text-slate-500 flex justify-between">
                <span>System Status: <span id="sys-stat" class="text-emerald-500">Idle</span></span>
                <span id="latency">Latency: 0ms</span>
            </div>
        </section>

        <!-- Main Display -->
        <div id="nexusDisplay" class="hidden space-y-8 animate-in fade-in slide-in-from-bottom-10 duration-1000">
            <div class="glass-panel p-1 rounded-3xl overflow-hidden relative group">
                <div class="stream-container">
                    <iframe id="nexusPlayer" allowfullscreen sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"></iframe>
                </div>
            </div>

            <!-- Fail-safe Link -->
            <div id="bypassLink" class="text-center"></div>

            <!-- Node Switcher -->
            <div class="flex flex-wrap justify-center gap-4">
                <button onclick="switchNode('primary')" class="glass-panel px-6 py-3 rounded-xl hover:bg-white/5 text-xs font-bold text-slate-300 tracking-tighter transition-all">NODE-01 (MAIN)</button>
                <button onclick="switchNode('mirror_alpha')" class="glass-panel px-6 py-3 rounded-xl hover:bg-white/5 text-xs font-bold text-slate-300 tracking-tighter transition-all">NODE-02 (ALPHA)</button>
                <button onclick="switchNode('mirror_beta')" class="glass-panel px-6 py-3 rounded-xl hover:bg-white/5 text-xs font-bold text-slate-300 tracking-tighter transition-all">NODE-03 (BETA)</button>
            </div>
        </div>
    </div>

    <script>
        let sessionRegistry = {};
        const ARCHITECTURE_URL = "https://media-nexus-w8hw.onrender.com/api/v1";

        async function initiateProtocol() {
            const title = document.getElementById('targetID').value;
            const sysStat = document.getElementById('sys-stat');
            const display = document.getElementById('nexusDisplay');
            const player = document.getElementById('nexusPlayer');
            const bypass = document.getElementById('bypassLink');
            
            if(!title) return;

            const startTime = Date.now();
            sysStat.innerText = "Connecting...";
            sysStat.classList.replace('text-emerald-500', 'text-cyan-400');

            try {
                const response = await fetch(`${ARCHITECTURE_URL}/resolve?title=${encodeURIComponent(title)}`);
                const data = await response.json();

                if(response.ok) {
                    const latency = Date.now() - startTime;
                    document.getElementById('latency').innerText = `Latency: ${latency}ms`;
                    
                    sessionRegistry = data.endpoints;
                    player.src = data.endpoints.primary;
                    display.classList.remove('hidden');
                    
                    sysStat.innerText = `Resolved: ${data.title}`;
                    bypass.innerHTML = `<a href="${data.endpoints.primary}" target="_blank" class="text-cyan-500 text-[10px] font-bold tracking-widest uppercase hover:text-white transition-colors">>> Protocol Blocked? Click to Open External Tunnel <<</a>`;
                } else {
                    sysStat.innerText = "Meta-Resolution Failed";
                    sysStat.classList.replace('text-cyan-400', 'text-red-500');
                }
            } catch (err) {
                sysStat.innerText = "Architecture Offline";
                sysStat.classList.replace('text-cyan-400', 'text-red-500');
            }
        }

        function switchNode(nodeKey) {
            if(sessionRegistry[nodeKey]) {
                document.getElementById('nexusPlayer').src = sessionRegistry[nodeKey];
                document.getElementById('bypassLink').innerHTML = `<a href="${sessionRegistry[nodeKey]}" target="_blank" class="text-cyan-500 text-[10px] font-bold tracking-widest uppercase hover:text-white transition-colors">>> Node ${nodeKey} Active: Click for External Tunnel <<</a>`;
            }
        }
    </script>
</body>
</html>
