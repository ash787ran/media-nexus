<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Nexus | Global Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        iframe { width: 100%; height: 500px; border-radius: 12px; border: none; }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center p-6">

    <div class="w-full max-w-4xl text-center mb-10">
        <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent mb-2">MEDIA NEXUS</h1>
        <p class="text-slate-400">Cloud-Powered Universal Stream Engine</p>
    </div>

    <div class="w-full max-w-2xl glass p-6 rounded-2xl shadow-2xl mb-8">
        <div class="flex gap-2">
            <input type="text" id="movieTitle" placeholder="Enter Movie or TV Show name..." 
                class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="searchMovie()" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-lg font-semibold transition">Search</button>
        </div>
        <p id="status" class="mt-3 text-sm text-slate-500"></p>
    </div>

    <div id="playerContainer" class="w-full max-w-5xl hidden">
        <div class="glass p-2 rounded-2xl">
            <iframe id="videoPlayer" src="" allowfullscreen></iframe>
        </div>
        <div class="flex flex-wrap gap-4 mt-6 justify-center">
            <button onclick="switchServer('primary')" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg text-sm border border-slate-600">Server 1 (Auto)</button>
            <button onclick="switchServer('mirror_alpha')" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg text-sm border border-slate-600">Server 2 (VidSrc)</button>
            <button onclick="switchServer('mirror_beta')" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg text-sm border border-slate-600">Server 3 (EmbedSu)</button>
        </div>
    </div>

    <script>
        let currentEndpoints = {};
        const API_BASE = "https://media-nexus-w8hw.onrender.com/api/v1";

        async function searchMovie() {
            const title = document.getElementById('movieTitle').value;
            const status = document.getElementById('status');
            const playerContainer = document.getElementById('playerContainer');
            
            if(!title) return;

            status.innerText = "🔍 Connecting to cloud engine...";
            status.classList.add('text-blue-400');

            try {
                const response = await fetch(`${API_BASE}/resolve?title=${encodeURIComponent(title)}`);
                const data = await response.json();

                if(response.ok) {
                    currentEndpoints = data.endpoints;
                    document.getElementById('videoPlayer').src = data.endpoints.primary;
                    playerContainer.classList.remove('hidden');
                    status.innerText = `✅ Found: ${data.title} (${data.media_type})`;
                } else {
                    status.innerText = "❌ Title not found in global database.";
                }
            } catch (err) {
                status.innerText = "⚠️ Cloud Engine is waking up... try again in 10 seconds.";
            }
        }

        function switchServer(key) {
            if(currentEndpoints[key]) {
                document.getElementById('videoPlayer').src = currentEndpoints[key];
            }
        }
    </script>
</body>
</html>
